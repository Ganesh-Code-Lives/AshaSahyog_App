name: iOS IPA Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Install CocoaPods
      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # Build IPA (IMPORTANT)
      - name: Build IPA
        run: flutter build ipa --release --no-codesign

      # Debug (optional but useful)
      - name: List build files
        run: ls -R build/ios

      # Upload IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
